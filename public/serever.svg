<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <filter id="glow">
    <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <g filter="url(#glow)">
    <rect x="2" y="3" width="20" height="6" rx="1" ry="1"></rect>
    <rect x="2" y="15" width="20" height="6" rx="1" ry="1"></rect>
    <circle cx="6" cy="6" r="1" fill="#4da6ff" stroke="none"></circle>
    <circle cx="6" cy="18" r="1" fill="#4da6ff" stroke="none"></circle>
    <line x1="10" y1="6" x2="18" y2="6"></line>
    <line x1="10" y1="18" x2="18" y2="18"></line>
  </g>
</svg>